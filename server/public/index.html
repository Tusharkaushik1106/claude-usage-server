<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Claude Usage Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 24px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
    }

    header span {
      font-size: 0.85rem;
      color: #64748b;
    }

    .dot {
      width: 10px; height: 10px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .card {
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 20px;
    }

    .card-label {
      font-size: 0.75rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .card-value {
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
    }

    .card-sub {
      font-size: 0.8rem;
      color: #94a3b8;
      margin-top: 4px;
    }

    .section-title {
      font-size: 1rem;
      font-weight: 600;
      color: #cbd5e1;
      margin-bottom: 16px;
    }

    .table-wrap {
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 12px;
      overflow: auto;
      margin-bottom: 32px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      background: #161827;
      color: #64748b;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 12px 16px;
      text-align: left;
    }

    td {
      padding: 12px 16px;
      border-top: 1px solid #2d3148;
      font-size: 0.9rem;
    }

    tr:hover td { background: #252840; }

    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .badge-opus    { background: #7c3aed22; color: #a78bfa; border: 1px solid #7c3aed44; }
    .badge-sonnet  { background: #0ea5e922; color: #38bdf8; border: 1px solid #0ea5e944; }
    .badge-haiku   { background: #22c55e22; color: #86efac; border: 1px solid #22c55e44; }
    .badge-unknown { background: #64748b22; color: #94a3b8; border: 1px solid #64748b44; }

    .charts-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 32px;
    }

    @media (max-width: 700px) {
      .charts-row { grid-template-columns: 1fr; }
    }

    .chart-card {
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 20px;
    }

    .refresh-btn {
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 18px;
      font-size: 0.85rem;
      cursor: pointer;
      margin-left: auto;
    }

    .refresh-btn:hover { background: #2563eb; }

    .empty {
      color: #475569;
      font-size: 0.9rem;
      padding: 32px;
      text-align: center;
    }

    .user-avatar {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px; height: 28px;
      border-radius: 50%;
      font-size: 0.75rem;
      font-weight: 700;
      margin-right: 8px;
    }
  </style>
</head>
<body>

<header>
  <div class="dot"></div>
  <h1>Claude Usage Tracker</h1>
  <span id="last-updated"></span>
  <button class="refresh-btn" onclick="load()">Refresh</button>
</header>

<!-- Summary cards -->
<div class="grid" id="summary-cards"></div>

<!-- Charts -->
<div class="charts-row">
  <div class="chart-card">
    <div class="section-title">Messages per User (All Time)</div>
    <canvas id="userChart" height="220"></canvas>
  </div>
  <div class="chart-card">
    <div class="section-title">Messages per Model (All Time)</div>
    <canvas id="modelChart" height="220"></canvas>
  </div>
</div>

<!-- Per-user breakdown table -->
<div class="section-title">Usage Breakdown</div>
<div class="table-wrap" id="breakdown-table"></div>

<!-- Recent activity -->
<div class="section-title" style="margin-top:32px">Recent Activity</div>
<div class="table-wrap" id="recent-table"></div>

<script>
const USER_COLORS = ['#3b82f6','#a855f7','#22c55e','#f59e0b','#ef4444','#06b6d4'];

function modelBadge(model) {
  const m = (model || '').toLowerCase();
  if (m.includes('opus'))   return `<span class="badge badge-opus">opus</span>`;
  if (m.includes('sonnet')) return `<span class="badge badge-sonnet">sonnet</span>`;
  if (m.includes('haiku'))  return `<span class="badge badge-haiku">haiku</span>`;
  return `<span class="badge badge-unknown">${model}</span>`;
}

function fmtTime(ts) {
  const d = new Date(ts);
  return d.toLocaleString();
}

let userChartInst = null;
let modelChartInst = null;

async function load() {
  const res = await fetch('/api/stats');
  const { stats, models, users, recent, modelTotals } = await res.json();

  document.getElementById('last-updated').textContent =
    'Updated ' + new Date().toLocaleTimeString();

  // Summary cards
  const totalMsgs = users.reduce((s, u) => s + (stats[u]?.total || 0), 0);
  const todayMsgs = users.reduce((s, u) =>
    s + models.reduce((ms, m) => ms + (stats[u]?.[m]?.today || 0), 0), 0);

  const topUser = users.sort((a,b) => (stats[b]?.total||0) - (stats[a]?.total||0))[0] || '-';

  document.getElementById('summary-cards').innerHTML = `
    <div class="card">
      <div class="card-label">Total Messages</div>
      <div class="card-value">${totalMsgs}</div>
      <div class="card-sub">All time across all users</div>
    </div>
    <div class="card">
      <div class="card-label">Today</div>
      <div class="card-value">${todayMsgs}</div>
      <div class="card-sub">Messages sent today</div>
    </div>
    <div class="card">
      <div class="card-label">Users</div>
      <div class="card-value">${users.length}</div>
      <div class="card-sub">Active trackers</div>
    </div>
    <div class="card">
      <div class="card-label">Top User</div>
      <div class="card-value" style="font-size:1.4rem">${topUser}</div>
      <div class="card-sub">${stats[topUser]?.total || 0} total messages</div>
    </div>
  `;

  // User chart
  const userCtx = document.getElementById('userChart').getContext('2d');
  if (userChartInst) userChartInst.destroy();
  userChartInst = new Chart(userCtx, {
    type: 'bar',
    data: {
      labels: users,
      datasets: [{
        label: 'Messages',
        data: users.map(u => stats[u]?.total || 0),
        backgroundColor: users.map((_, i) => USER_COLORS[i % USER_COLORS.length] + 'cc'),
        borderColor: users.map((_, i) => USER_COLORS[i % USER_COLORS.length]),
        borderWidth: 1,
        borderRadius: 6,
      }]
    },
    options: {
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#94a3b8' }, grid: { color: '#2d3148' } },
        y: { ticks: { color: '#94a3b8' }, grid: { color: '#2d3148' } }
      }
    }
  });

  // Model chart
  const modelCtx = document.getElementById('modelChart').getContext('2d');
  if (modelChartInst) modelChartInst.destroy();
  const modelColors = { opus: '#a78bfa', sonnet: '#38bdf8', haiku: '#86efac' };
  modelChartInst = new Chart(modelCtx, {
    type: 'doughnut',
    data: {
      labels: models,
      datasets: [{
        data: models.map(m => modelTotals[m] || 0),
        backgroundColor: models.map(m =>
          modelColors[m] ? modelColors[m] + '99' : '#64748b99'),
        borderColor: models.map(m => modelColors[m] || '#64748b'),
        borderWidth: 1,
      }]
    },
    options: {
      plugins: {
        legend: { labels: { color: '#94a3b8' } }
      }
    }
  });

  // Breakdown table
  if (users.length === 0) {
    document.getElementById('breakdown-table').innerHTML = '<div class="empty">No data yet. Install the hook script on your machines.</div>';
  } else {
    const modelCols = models.map(m => `<th>${m}</th>`).join('');
    const rows = users.map((u, i) => {
      const color = USER_COLORS[i % USER_COLORS.length];
      const modelCells = models.map(m => {
        const d = stats[u]?.[m] || { total: 0, today: 0 };
        return `<td>${d.total} <span style="color:#475569;font-size:0.8em">(${d.today} today)</span></td>`;
      }).join('');
      return `<tr>
        <td>
          <span class="user-avatar" style="background:${color}22;color:${color};border:1px solid ${color}44">
            ${u[0].toUpperCase()}
          </span>
          ${u}
        </td>
        ${modelCells}
        <td><strong>${stats[u]?.total || 0}</strong></td>
      </tr>`;
    }).join('');

    document.getElementById('breakdown-table').innerHTML = `
      <table>
        <thead><tr><th>User</th>${modelCols}<th>Total</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  // Recent activity
  if (recent.length === 0) {
    document.getElementById('recent-table').innerHTML = '<div class="empty">No activity yet.</div>';
  } else {
    const rows = recent.map(r => `
      <tr>
        <td>${r.username}</td>
        <td>${modelBadge(r.model)}</td>
        <td style="color:#64748b;font-size:0.85em">${fmtTime(r.timestamp)}</td>
      </tr>`).join('');

    document.getElementById('recent-table').innerHTML = `
      <table>
        <thead><tr><th>User</th><th>Model</th><th>Time</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }
}

load();
setInterval(load, 30000); // auto-refresh every 30s
</script>
</body>
</html>
